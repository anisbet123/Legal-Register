<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SafeWork Pro</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Stores the current path in sessionStorage then redirects to index.html
      // which reads it back and restores the correct route.
      var pathSegmentsToKeep = 1; // = number of segments in your repo base path
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
